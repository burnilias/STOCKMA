services:

  app:
    image: webdevops/php-apache:8.3
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:80"
    depends_on:
      - db
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: gestionstock
      DB_USERNAME: root
      DB_PASSWORD: root
      PHP_FPM_PM: dynamic
      PHP_FPM_PM_MAX_CHILDREN: 20
      PHP_FPM_PM_START_SERVERS: 4
      PHP_FPM_PM_MIN_SPARE_SERVERS: 2
      PHP_FPM_PM_MAX_SPARE_SERVERS: 6

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestionstock
      MYSQL_ROOT_HOST: "%"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8888:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: